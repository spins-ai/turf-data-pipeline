# =============================================================================
# pipeline_config.yaml — Configuration du pipeline turf-data
# =============================================================================
#
# Pilier 8 : ordre d'execution, dependances, parametres par phase.
#
# Phases :
#   1. Audit             — verification d'integrite des donnees brutes
#   2. Nettoyage         — normalisation, suppression doublons textuels
#   3. Deduplication     — dedup stricte sur UIDs
#   4. Comblage          — remplissage des trous par interpolation/API
#   5. Merges            — fusion des sources en fichiers master (parallele)
#   6. Mega merge        — fusion finale de tous les masters
#   7. Features          — calcul de features individuelles (parallele)
#   8. Master features   — assemblage de la matrice de features
#   9. Quality           — tests de qualite et validation finale
#
# Usage :
#   Charge par run_pipeline.py ou tout orchestrateur qui lit ce YAML.
# =============================================================================

pipeline:
  name: turf-data-pipeline
  version: "1.0.0"
  python_exe: "C:\\Users\\celia\\AppData\\Local\\Programs\\Python\\Python312\\python.exe"
  max_workers: 4
  max_concurrent_heavy: 3    # max 3 taches >= 2 Go RAM simultanees

# =============================================================================
# Defaults appliques a tout script sauf surcharge
# =============================================================================
defaults:
  timeout_seconds: 3600      # 1 heure par defaut
  ram_budget_mb: 1024
  retry_on_failure: true
  max_retries: 2
  supports_resume: false

# =============================================================================
# Phase 1 — Audit
# =============================================================================
phases:

  - phase: 1
    name: "Audit"
    description: "Verification d'integrite des donnees brutes"
    ram_budget_mb: 1024
    parallel: false
    scripts:
      - name: audit
        script: audit_data_integrity.py
        timeout_seconds: 1800
        ram_budget_mb: 1024
        supports_resume: false
        depends_on: []

  # ===========================================================================
  # Phase 2 — Nettoyage
  # ===========================================================================
  - phase: 2
    name: "Nettoyage"
    description: "Normalisation des champs, nettoyage des valeurs aberrantes"
    ram_budget_mb: 2048
    parallel: false
    scripts:
      - name: nettoyage
        script: nettoyage_global.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [audit]

  # ===========================================================================
  # Phase 3 — Deduplication
  # ===========================================================================
  - phase: 3
    name: "Deduplication"
    description: "Suppression des doublons stricts sur UIDs"
    ram_budget_mb: 2048
    parallel: false
    scripts:
      - name: dedup
        script: deduplication.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [nettoyage]

  # ===========================================================================
  # Phase 4 — Comblage
  # ===========================================================================
  - phase: 4
    name: "Comblage"
    description: "Remplissage des champs manquants par interpolation ou API"
    ram_budget_mb: 2048
    parallel: false
    scripts:
      - name: comblage
        script: comblage_trous.py
        timeout_seconds: 7200
        ram_budget_mb: 2048
        supports_resume: true
        depends_on: [dedup]

  # ===========================================================================
  # Phase 5 — Merges (parallele)
  # ===========================================================================
  - phase: 5
    name: "Merges"
    description: "Fusion des sources en fichiers master par domaine"
    ram_budget_mb: 2048
    parallel: true
    scripts:
      - name: merge_courses_master
        script: merge_02_02b_courses_master.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [comblage]

      - name: merge_pedigree_master
        script: merge_pedigree_master.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [comblage]

      - name: merge_rapports_21_38
        script: merge_rapports_21_38.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [comblage]

      - name: merge_rapports_master
        script: merge_rapports_master.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [merge_rapports_21_38]

      - name: merge_meteo
        script: merge_meteo.py
        timeout_seconds: 1800
        ram_budget_mb: 1024
        supports_resume: false
        depends_on: [comblage]

      - name: merge_meteo_master
        script: merge_meteo_master.py
        timeout_seconds: 1800
        ram_budget_mb: 1024
        supports_resume: false
        depends_on: [merge_meteo]

      - name: merge_equipements_master
        script: merge_equipements_master.py
        timeout_seconds: 1800
        ram_budget_mb: 1024
        supports_resume: false
        depends_on: [comblage]

      - name: merge_marche_master
        script: merge_marche_master.py
        timeout_seconds: 1800
        ram_budget_mb: 1024
        supports_resume: false
        depends_on: [comblage]

      - name: merge_performances_master
        script: merge_performances_master.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [comblage]

      - name: merge_stats_externes_master
        script: merge_stats_externes_master.py
        timeout_seconds: 3600
        ram_budget_mb: 2048
        supports_resume: false
        depends_on: [comblage]

  # ===========================================================================
  # Phase 6 — Mega merge
  # ===========================================================================
  - phase: 6
    name: "Mega merge"
    description: "Fusion finale de tous les masters en partants_master.jsonl"
    ram_budget_mb: 4096
    parallel: false
    scripts:
      - name: mega_merge
        script: mega_merge_partants_master.py
        timeout_seconds: 7200
        ram_budget_mb: 4096
        supports_resume: true
        depends_on:
          - merge_courses_master
          - merge_pedigree_master
          - merge_rapports_master
          - merge_meteo_master
          - merge_equipements_master
          - merge_marche_master
          - merge_performances_master
          - merge_stats_externes_master

